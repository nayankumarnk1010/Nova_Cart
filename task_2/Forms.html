<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login From </title>
</head>
<body>
    <form action="">
        <fieldset>
        <legend>Login Form</legend>
        <label for="name">Name:</label>

        <input type="submit">
        </fieldset>
    </form>
</body>
</html>
