<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <link rel="stylesheet" href="tictactoe.css">
</head>
<body>
    <header>
        <h1>TicTacToe.com</h1>
    </header>
    <section class="container">
    <div class="left_div">
        <div class="divbox" style="border-left: none;border-top: none;"><span class="boxtext"></span></div>
        <div class="divbox" style="border-top: none;"><span class="boxtext"></span></div>
        <div class="divbox" style="border-right: none;border-top: none;"><span class="boxtext"></span></div>
        <div class="divbox" style="border-left: none;"><span class="boxtext"></span></div>
        <div class="divbox"><span class="boxtext"></span></div>
        <div class="divbox" style="border-right: none;"><span class="boxtext"></span></div>
        <div class="divbox" style="border-left: none;border-bottom: none;"><span class="boxtext"></span></div>
        <div class="divbox" style="border-bottom: none;"><span class="boxtext"></span></div>
        <div class="divbox" style="border-right: none;border-bottom: none;"><span class="boxtext"></span></div>
    </div>
    <div class="right_div">
        <h2>Welcome to TicTacToe.com</h2>
        <div class="right">
            <p class="info">Turn for: X</p>
            <button class="reset">Reset</button>
        </div>
        <div class="imgbox">
            <img src="../images/excited (1).gif" alt="#">
        </div>
    </div>
    </section>
    <script src="tictactoe.js"></script>
</body>
</html>
