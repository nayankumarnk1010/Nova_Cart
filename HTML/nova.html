<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Cart</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">   
    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/nova.css">
    <!-- JS  -->
    <script src="../JS/nova.js"></script>
</head>

<body>

<nav>
    <!-- LEFT -->
    <section class="nav_left">
        <div class="logo">NovaCart</div>
            <div class="nav-links">
                <a href="#" class="active">Shop</a>
                <a href="#">About</a>
            </div>
    </section>

    <!-- RIGHT -->
    <section class="nav_right">

        <!-- Search -->
        <div class="search-container" id="searchBox">
            <input type="text" class="search-input" placeholder="Search...">
            <button class="search-btn" id="searchBtn"><i class="bi bi-search"></i></button>
        </div>

        <!-- Dropdown -->
        <div class="dropdown">
            <button class="category-btn">All Categories ▼</button>
                <div class="dropdown-content">
                    <a href="#">Beauty</a>
                    <a href="#">Electronics</a>
                    <a href="#">Fashion</a>
                    <a href="#">Home</a>
                    <a href="#">Outdoor</a>
                    <a href="#">Sports</a>
                </div>
        </div>

        <!-- Auth Buttons -->
        <div class="auth-buttons">
            <button class="login-btn">Login</button>
            <button class="register-btn">Register</button>
        </div>
        <div class="cart_btn">
            <button class="cart-btn" id="cartBtn"><i class="fa-solid fa-bag-shopping"></i></button>
        </div>
    </section>

</nav>
<section class="main_content">
    <div class="main_div_left">
        <p style="color: rgb(167, 233, 255);font-weight: 900; font-size: small;">NEW COLLECTION</p>
        <h1>Shop reliable products for everyday work and life.</h1>
        <p>Curated electronics, fashion, home goods, and accessories with a fast local cart experience.</p>
    </div>
    <div class="main_div_right">
        <div class="span_product"><span>50</span><p>Products</p></div>
        <div class="span_page"><span>5</span><p>Pages</p></div>
        <div class="span_dispatch"><span>24h</span><p>Dispatch</p></div>
    </div>
</section>

</body>
</html>
