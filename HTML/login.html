<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">NovaCart</div>
        <nav class="nav_a">
            <a href="#">Shop</a>
            <a href="#">About</a>
        </nav>
        <div class="auth-buttons">
            <button class="btn-login">Login</button>
            <button class="btn-register">Register</button>
        </div>
    </header>

    <main class="login-container">
        <div class="login-card">
            
            <div class="hero-section">
                <div class="hero-overlay">
                    <p class="subtitle">WELCOME BACK</p>
                    <h1>Access your cart and continue shopping faster.</h1>
                    <p class="note">Your demo account is stored locally in this browser for portfolio and learning use.</p>
                </div>
            </div>

            <div class="form-section">
                <h2>Login</h2>
                <p class="form-instruction">Enter your registered email and password.</p>
                
                <form>
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-footer">
                        <label class="checkbox-container">
                            <input type="checkbox" checked>
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="create-link">Create account</a>
                    </div>

                    <button type="submit" class="login-submit">Login</button>
                </form>
            </div>

        </div>
    </main>

</body>
</html>
